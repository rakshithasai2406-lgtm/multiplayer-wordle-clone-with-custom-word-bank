<h1>🎯 Multiplayer Wordle Clone</h1>

<p>Guess the 5-letter word in 6 attempts.</p>

<div class="controls">

    <input
        id="guessInput"
        type="text"
        maxlength="5"
        placeholder="Enter 5-letter word">

    <button id="submitBtn">
        Submit Guess
    </button>

    <button onclick="showAdminPanel()">
        Admin Panel
    </button>

    <button onclick="addPlayer()">
        Add Player
    </button>

    <button onclick="showLeaderboard()">
        Leaderboard
    </button>

</div>

<div class="board">

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="row">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

</div>

<script src="words.js"></script>
