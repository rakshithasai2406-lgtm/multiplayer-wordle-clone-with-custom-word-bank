<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Wordle Clone</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .board {
            display: inline-block;
            margin-top: 20px;
        }

        .row {
            display: flex;
            justify-content: center;
            margin: 5px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid #888;
            margin: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            text-transform: uppercase;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🎯 Multiplayer Wordle Clone</h1>

    <p>Guess the 5-letter word in 6 attempts.</p>

    <div class="controls">
        <input
            id="guessInput"
            type="text"
            placeholder="Enter 5-letter word"
            maxlength="5">

        <button id="submitBtn">
            Submit Guess
        </button>
    </div>

    <div class="board">

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

        <div class="row">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="words.js"></script>

</body>
</html>
